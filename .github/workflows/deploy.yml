name: CD (Deploy to Host)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Mac via Tailscale SSH
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:deployment

      - name: SSH and Execute Deploy on Mac
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # Add host to known_hosts to prevent interactive prompt
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_deploy ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "echo '=== echo.err ===' && cat /Users/${{ secrets.DEPLOY_USER }}/echo/logs/echo.err || true && \
             echo '=== echo.log ===' && cat /Users/${{ secrets.DEPLOY_USER }}/echo/logs/echo.log || true && \
             echo '=== Python/Uvicorn Check ===' && \
             /Users/${{ secrets.DEPLOY_USER }}/echo/.venv/bin/python --version || true && \
             /Users/${{ secrets.DEPLOY_USER }}/echo/.venv/bin/uvicorn --version || true && \
             echo '=== Directory Check ===' && \
             ls -la /Users/${{ secrets.DEPLOY_USER }}/echo/logs/ || true"

      - name: Report deployed commit
        run: echo "Deployed ${{ github.sha }} to ${{ secrets.DEPLOY_HOST }}"
